name: Deploy Grudge Backend

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/grudge-backend
  DEPLOY_DIR: /opt/grudge-backend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      packages: read

    steps:
      - name: Deploy to GRUDA VPS via docker-compose
        uses: appleboy/ssh-action@v1
        env:
          IMAGE_TAG: sha-${{ github.sha }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          CLOUDFLARE_TUNNEL_TOKEN: ${{ secrets.CLOUDFLARE_TUNNEL_TOKEN }}
          CROSSMINT_API_KEY: ${{ secrets.CROSSMINT_API_KEY }}
          CROSSMINT_COLLECTION_CHARACTERS: ${{ secrets.CROSSMINT_COLLECTION_CHARACTERS }}
          CROSSMINT_COLLECTION_ISLANDS: ${{ secrets.CROSSMINT_COLLECTION_ISLANDS }}
          DISCORD_CLIENT_ID: ${{ secrets.DISCORD_CLIENT_ID }}
          DISCORD_CLIENT_SECRET: ${{ secrets.DISCORD_CLIENT_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: IMAGE_TAG,DB_PASSWORD,JWT_SECRET,CLOUDFLARE_TUNNEL_TOKEN,CROSSMINT_API_KEY,CROSSMINT_COLLECTION_CHARACTERS,CROSSMINT_COLLECTION_ISLANDS,DISCORD_CLIENT_ID,DISCORD_CLIENT_SECRET,ANTHROPIC_API_KEY,GEMINI_API_KEY
          script: |
            set -e
            DEPLOY_DIR=/opt/grudge-backend

            # Pull latest code
            if [ ! -d "$DEPLOY_DIR/.git" ]; then
              git clone https://github.com/MolochDaGod/grudge-backend.git "$DEPLOY_DIR"
            fi
            cd "$DEPLOY_DIR"
            git fetch origin main
            git reset --hard origin/main

            # Write production .env — one key per echo, no heredoc indentation issues
            {
              echo "IMAGE_TAG=${IMAGE_TAG}"
              echo "DB_PASSWORD=${DB_PASSWORD}"
              echo "JWT_SECRET=${JWT_SECRET}"
              echo "CLOUDFLARE_TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}"
              echo "CROSSMINT_API_KEY=${CROSSMINT_API_KEY}"
              echo "CROSSMINT_COLLECTION_CHARACTERS=${CROSSMINT_COLLECTION_CHARACTERS:-grudge-characters}"
              echo "CROSSMINT_COLLECTION_ISLANDS=${CROSSMINT_COLLECTION_ISLANDS:-grudge-islands}"
              echo "DISCORD_CLIENT_ID=${DISCORD_CLIENT_ID}"
              echo "DISCORD_CLIENT_SECRET=${DISCORD_CLIENT_SECRET}"
              echo "DISCORD_REDIRECT_URI=https://api.grudge-studio.com/auth/discord/callback"
              echo "ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}"
              echo "GEMINI_API_KEY=${GEMINI_API_KEY}"
              echo "CORS_ORIGINS=https://grudgewarlords.com,https://www.grudgewarlords.com,https://grudge-studio.com,https://grudgestudio.com,https://client.grudge-studio.com,https://dash.grudge-studio.com,https://warlord-crafting-suite.vercel.app,https://gdevelop-assistant.vercel.app,https://grudachain-rho.vercel.app,https://grudachain.grudgestudio.com,https://gruda-wars.vercel.app,https://grudge-engine-web.vercel.app,https://starwaygruda-webclient-as2n.vercel.app,https://grim-armada-web.vercel.app,https://grudge-angeler.vercel.app,https://grudge-rts.vercel.app,https://grudge-space-rts.vercel.app,https://grudge-studio-dash.vercel.app,https://nexus-nemesis-game.vercel.app,https://grudge-pvp-server.vercel.app,https://grudge-origins.vercel.app,https://the-engine-grudgenexus.vercel.app,https://grudge-platform.vercel.app,https://grudgeplatform.com,https://www.grudgeplatform.com,https://grudgeplatform.io,https://www.grudgeplatform.io,https://dungeon-crawler-quest.vercel.app,https://molochdagod.github.io,https://app.puter.com,http://localhost:5173"
              echo "FRONTEND_URL=https://grudgewarlords.com"
            } > .env

            # Pull pre-built image from GHCR (built by build-and-push job above)
            docker compose pull api
            docker compose up -d

            # Health check with retries
            echo "Waiting for API to become healthy..."
            sleep 10
            for i in $(seq 1 6); do
              if docker compose exec -T api wget -qO- http://localhost:5000/api/health > /dev/null 2>&1; then
                echo "✅ Deploy successful (attempt $i)"
                docker compose ps
                exit 0
              fi
              echo "  Attempt $i/6 — retrying in 5s..."
              sleep 5
            done

            echo "⚠️  Health check failed — logs:"
            docker compose logs --tail=50 api
            exit 1
