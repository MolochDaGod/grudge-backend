name: Deploy Grudge Backend

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/grudge-backend
  DEPLOY_DIR: /opt/grudge-backend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to GRUDA VPS via docker-compose
        uses: appleboy/ssh-action@v1
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          CLOUDFLARE_TUNNEL_TOKEN: ${{ secrets.CLOUDFLARE_TUNNEL_TOKEN }}
          CROSSMINT_API_KEY: ${{ secrets.CROSSMINT_API_KEY }}
          CROSSMINT_COLLECTION_CHARACTERS: ${{ secrets.CROSSMINT_COLLECTION_CHARACTERS }}
          CROSSMINT_COLLECTION_ISLANDS: ${{ secrets.CROSSMINT_COLLECTION_ISLANDS }}
          DISCORD_CLIENT_ID: ${{ secrets.DISCORD_CLIENT_ID }}
          DISCORD_CLIENT_SECRET: ${{ secrets.DISCORD_CLIENT_SECRET }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: DB_PASSWORD,JWT_SECRET,CLOUDFLARE_TUNNEL_TOKEN,CROSSMINT_API_KEY,CROSSMINT_COLLECTION_CHARACTERS,CROSSMINT_COLLECTION_ISLANDS,DISCORD_CLIENT_ID,DISCORD_CLIENT_SECRET,GEMINI_API_KEY
          script: |
            set -e
            DEPLOY_DIR=/opt/grudge-backend

            # Pull latest code
            if [ ! -d "$DEPLOY_DIR/.git" ]; then
              git clone https://github.com/MolochDaGod/grudge-backend.git "$DEPLOY_DIR"
            fi
            cd "$DEPLOY_DIR"
            git fetch origin main
            git reset --hard origin/main

            # Write production .env from GitHub Secrets
            cat > .env << EOF
            DB_PASSWORD=${DB_PASSWORD}
            JWT_SECRET=${JWT_SECRET}
            CLOUDFLARE_TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
            CROSSMINT_API_KEY=${CROSSMINT_API_KEY}
            CROSSMINT_COLLECTION_CHARACTERS=${CROSSMINT_COLLECTION_CHARACTERS:-grudge-characters}
            CROSSMINT_COLLECTION_ISLANDS=${CROSSMINT_COLLECTION_ISLANDS:-grudge-islands}
            DISCORD_CLIENT_ID=${DISCORD_CLIENT_ID}
            DISCORD_CLIENT_SECRET=${DISCORD_CLIENT_SECRET}
            DISCORD_REDIRECT_URI=https://api.grudge-studio.com/auth/discord/callback
            GEMINI_API_KEY=${GEMINI_API_KEY}
            CORS_ORIGINS=https://grudgewarlords.com,https://www.grudgewarlords.com,https://grudge-studio.com,https://grudgestudio.com,https://dash.grudge-studio.com,https://grudge-platform.vercel.app,https://warlord-crafting-suite.vercel.app,https://gdevelop-assistant.vercel.app,https://grudachain-rho.vercel.app,https://gruda-wars.vercel.app,https://molochdagod.github.io,http://localhost:5173
            FRONTEND_URL=https://grudgewarlords.com
            EOF
            # Remove leading whitespace from heredoc
            sed -i 's/^[[:space:]]*//' .env

            # Build and deploy all services (postgres + api + cloudflared)
            docker compose build --no-cache api
            docker compose up -d

            # Wait for API to become healthy
            echo "Waiting for API health check..."
            sleep 15
            for i in 1 2 3 4 5; do
              if docker compose exec -T api wget -qO- http://localhost:5000/api/health; then
                echo ""
                echo "✅ Grudge Backend deployed successfully"
                exit 0
              fi
              echo "  Attempt $i/5 — retrying in 5s..."
              sleep 5
            done

            echo "⚠️  Health check did not pass — check logs with: docker compose logs api"
            docker compose logs --tail=30 api
            exit 1
