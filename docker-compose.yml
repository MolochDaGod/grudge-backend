# docker-compose.yml — Grudge Studio Production Stack
# Requires .env with: DB_PASSWORD, JWT_SECRET, CLOUDFLARE_TUNNEL_TOKEN
# Optional: CROSSMINT_API_KEY, DISCORD_CLIENT_ID/SECRET, GEMINI_API_KEY

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: grudge_game
      POSTGRES_USER: grudge
      # DB_PASSWORD must be set in .env — no insecure default in production
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - pgdata:/var/lib/postgresql/data
    # Do NOT expose 5432 publicly — only accessible within the Docker network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U grudge -d grudge_game"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    image: ghcr.io/molochdagod/grudge-backend:${IMAGE_TAG:-latest}
    build: .
    restart: unless-stopped
    container_name: grudge-backend
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    networks:
      default:
        aliases:
          - grudge-backend
    environment:
      DATABASE_URL: postgresql://grudge:${DB_PASSWORD:?DB_PASSWORD is required}@postgres:5432/grudge_game
      PORT: "5000"
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      CROSSMINT_API_KEY: ${CROSSMINT_API_KEY:-}
      CROSSMINT_COLLECTION_CHARACTERS: ${CROSSMINT_COLLECTION_CHARACTERS:-grudge-characters}
      CROSSMINT_COLLECTION_ISLANDS: ${CROSSMINT_COLLECTION_ISLANDS:-grudge-islands}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID:-}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET:-}
      DISCORD_REDIRECT_URI: ${DISCORD_REDIRECT_URI:-https://api.grudge-studio.com/auth/discord/callback}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://grudgewarlords.com,https://grudge-studio.com,https://dash.grudge-studio.com,https://warlord-crafting-suite.vercel.app,https://gdevelop-assistant.vercel.app,https://grudachain-rho.vercel.app,http://localhost:5173}
      FRONTEND_URL: ${FRONTEND_URL:-https://grudgewarlords.com}
    # No port binding — cloudflared handles all inbound traffic
    expose:
      - "5000"

  # Cloudflare Tunnel - replaces nginx, handles SSL + reverse proxy + DDoS protection
  # No open inbound ports needed. Outbound-only connection to Cloudflare edge.
  # Create tunnel at: https://one.dash.cloudflare.com -> Networks -> Tunnels
  # Map: api.grudge-studio.com -> http://api:5000
  #       ws.grudge-studio.com  -> http://api:5000 (WebSocket)
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    command: tunnel run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    healthcheck:
      test: ["CMD", "cloudflared", "tunnel", "--no-autoupdate", "info"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  pgdata:
