version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: grudge_game
      POSTGRES_USER: grudge
      POSTGRES_PASSWORD: ${DB_PASSWORD:-grudge_secure_2026}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U grudge -d grudge_game"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://grudge:${DB_PASSWORD:-grudge_secure_2026}@postgres:5432/grudge_game
      PORT: "5000"
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET}
      CROSSMINT_API_KEY: ${CROSSMINT_API_KEY}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET}
      DISCORD_REDIRECT_URI: ${DISCORD_REDIRECT_URI:-https://api.grudge-studio.com/auth/discord/callback}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://grudgewarlords.com,https://grudge-studio.com,http://localhost:5173}
      FRONTEND_URL: ${FRONTEND_URL:-https://grudgewarlords.com}
    ports:
      - "5000:5000"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/certs:/etc/nginx/certs:ro

volumes:
  pgdata:
